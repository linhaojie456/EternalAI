name: Emulator Test & ARM64 Build
on: [push, workflow_dispatch]
env:
  ANDROID_HOME: /usr/local/lib/android/sdk
jobs:
  test-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Run CI Test Script
        run: bash ci_test.sh

  build-arm64:
    needs: test-emulator
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'
      - name: Build ARM64 APK
        run: |
          sed -i 's/abiFilters += "x86_64"/abiFilters += "arm64-v8a"/g' app/build.gradle.kts
          gradle assembleDebug --no-build-cache -Dorg.gradle.jvmargs="-Xmx6g"
      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: Eternal-AI-arm64
          path: app/build/outputs/apk/debug/app-debug.apk
