name: Build Eternal APK
on: [push, workflow_dispatch]
env:
  ANDROID_HOME: /usr/local/lib/android/sdk
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin'}
      - uses: gradle/actions/setup-gradle@v3
        with: {gradle-version: '8.9'}
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - name: Create model directory
        run: mkdir -p app/src/main/assets/model
      - name: Download DeepSeek ONNX model (smart)
        working-directory: app/src/main/assets/model
        run: |
          pip install -q huggingface_hub
          python3 << 'PYEOF'
          from huggingface_hub import list_repo_files, hf_hub_download
          import os, sys
          repo_id = "onnx-community/DeepSeek-R1-Distill-Qwen-1.5B-ONNX"
          print(f"Fetching file list from {repo_id}...")
          try:
              all_files = list_repo_files(repo_id)
          except Exception as e:
              print(f"Error listing files: {e}")
              sys.exit(1)
          model_files = [f for f in all_files if f.endswith(".onnx") and ("model" in f or "quant" in f)]
          if not model_files:
              print("No .onnx model file found")
              sys.exit(1)
          preferred = [f for f in model_files if "quant" in f.lower()]
          model_file = preferred[0] if preferred else model_files[0]
          print(f"Selected model file: {model_file}")
          tokenizer_files = ["tokenizer.json", "tokenizer_config.json"]
          for fname in [model_file] + tokenizer_files:
              if fname not in all_files:
                  print(f"Warning: {fname} not found")
                  continue
              print(f"Downloading {fname} ...")
              path = hf_hub_download(repo_id, fname, local_dir=".")
              size = os.path.getsize(path)
              print(f"  ✓ {fname}: {size:,} bytes")
              if size < 1000:
                  print(f"  ✗ {fname} is too small")
                  sys.exit(1)
          if model_file != "model.onnx":
              os.rename(model_file, "model.onnx")
          print("All required files downloaded.")
          PYEOF
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9
      - name: Write project files
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
      - name: Build debug APK
        run: ./gradlew assembleDebug -Dorg.gradle.jvmargs="-Xmx6g"
        env: {GRADLE_OPTS: "-Xmx6g"}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with: {name: "永恒-APK", path: "app/build/outputs/apk/debug/app-debug.apk"}
