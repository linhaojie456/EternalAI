name: Build Eternal APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.9

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create model directory
        run: mkdir -p app/src/main/assets/model

      - name: Download DeepSeek ONNX model
        working-directory: app/src/main/assets/model
        run: |
          pip install -q huggingface_hub
          hf download onnx-community/DeepSeek-R1-Distill-Qwen-1.5B-ONNX \
            onnx/model_quantized.onnx tokenizer.json tokenizer_config.json \
            --local-dir .
          mv onnx/model_quantized.onnx model.onnx
          rm -rf onnx

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Fix configuration
        run: |
          # 降级 AGP 到兼容 Chaquopy 的版本
          sed -i 's/id("com.android.application") version "8.7.3"/id("com.android.application") version "8.5.2"/' build.gradle.kts
          sed -i 's/id("org.jetbrains.kotlin.android") version "1.9.22"/id("org.jetbrains.kotlin.android") version "1.9.0"/' build.gradle.kts
          # 移除硬编码的 Python 路径
          sed -i '/buildPython/d' app/build.gradle.kts
          sed -i '/pythonVersion/d' app/build.gradle.kts
          # 添加 AppCompat 依赖（解决主题缺失）
          sed -i '/dependencies {/a \    implementation("androidx.appcompat:appcompat:1.6.1")' app/build.gradle.kts
          # 不压缩 .onnx 文件（避免打包时 OOM）
          sed -i '/android {/a \    aaptOptions { noCompress "onnx" }' app/build.gradle.kts

      - name: Build debug APK (加大内存)
        run: ./gradlew assembleDebug -Dorg.gradle.jvmargs="-Xmx4g"
        env:
          GRADLE_OPTS: "-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 永恒-APK
          path: app/build/outputs/apk/debug/app-debug.apk
