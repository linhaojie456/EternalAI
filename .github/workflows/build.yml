name: Build Eternal APK
on: [push, workflow_dispatch]
env:
  ANDROID_HOME: /usr/local/lib/android/sdk
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin'}
      - uses: gradle/actions/setup-gradle@v3
        with: {gradle-version: '8.9'}
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - name: Create model directory
        run: mkdir -p app/src/main/assets/model

      - name: Download DeepSeek ONNX model (smart)
        working-directory: app/src/main/assets/model
        run: |
          pip install -q huggingface_hub
          python3 << 'PYEOF'
          from huggingface_hub import list_repo_files, hf_hub_download
          import os, sys

          repo_id = "onnx-community/DeepSeek-R1-Distill-Qwen-1.5B-ONNX"

          # 1. 列出仓库所有文件
          print(f"Fetching file list from {repo_id}...")
          try:
              all_files = list_repo_files(repo_id)
          except Exception as e:
              print(f"Error listing files: {e}")
              sys.exit(1)

          print("Files found:")
          for f in all_files:
              print(f"  {f}")

          # 2. 找到模型文件（可能是 model.onnx 或 model_quantized.onnx）
          model_files = [f for f in all_files if f.endswith(".onnx") and ("model" in f or "quant" in f)]
          if not model_files:
              print("No .onnx model file found in repository")
              sys.exit(1)
          # 优先选择量化模型
          preferred = [f for f in model_files if "quant" in f.lower()]
          model_file = preferred[0] if preferred else model_files[0]
          print(f"Selected model file: {model_file}")

          # 3. 需要的 tokenizer 文件
          tokenizer_files = ["tokenizer.json", "tokenizer_config.json"]
          
          # 4. 下载所有文件
          files_to_download = [model_file] + tokenizer_files
          for fname in files_to_download:
              if fname not in all_files:
                  print(f"Warning: {fname} not found in repository")
                  continue
              print(f"Downloading {fname} ...")
              path = hf_hub_download(repo_id, fname, local_dir=".")
              size = os.path.getsize(path)
              print(f"  ✓ {fname}: {size:,} bytes")
              if size < 1000:
                  print(f"  ✗ {fname} is too small, aborting")
                  sys.exit(1)

          # 5. 如果模型文件不叫 model.onnx，重命名
          if model_file != "model.onnx":
              print(f"Renaming {model_file} -> model.onnx")
              os.rename(model_file, "model.onnx")

          print("All required files downloaded and verified.")
          PYEOF

      - name: Inject onnxruntime native lib
        run: |
          wget -q https://repo1.maven.org/maven2/com/microsoft/onnxruntime/onnxruntime-android/1.21.1/onnxruntime-android-1.21.1.aar
          unzip -q onnxruntime-android-1.21.1.aar -d ort
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp ort/jni/arm64-v8a/libonnxruntime.so app/src/main/jniLibs/arm64-v8a/

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Write project files
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat > build.gradle.kts << 'INNER_EOF'
          plugins {
              id("com.android.application") version "8.5.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
              id("com.chaquo.python") version "15.0.1" apply false
          }
          INNER_EOF

      - name: Build debug APK
        run: ./gradlew assembleDebug -Dorg.gradle.jvmargs="-Xmx6g"
        env: {GRADLE_OPTS: "-Xmx6g"}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with: {name: "永恒-APK", path: "app/build/outputs/apk/debug/app-debug.apk"}
