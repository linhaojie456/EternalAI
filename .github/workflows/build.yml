name: Final Build + 10-Turn Test (Fix 429 + Emu)
on: [push, workflow_dispatch]
env:
  ANDROID_HOME: /usr/local/lib/android/sdk
jobs:
  test-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Prepare x86_64 build
        run: |
          cat > app/src/main/java/com/eternal/ai/VideoScreen.kt << 'VEOF'
          package com.eternal.ai
          import androidx.compose.foundation.background
          import androidx.compose.foundation.layout.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp
          @Composable
          fun VideoScreen() {
              Box(modifier = Modifier.fillMaxSize().background(NeoChineseColors.InkBlack), contentAlignment = Alignment.Center) {
                  Column(horizontalAlignment = Alignment.CenterHorizontally) {
                      Text("📹 神域洞察", color = NeoChineseColors.SkyBlue, fontSize = 24.sp, fontWeight = FontWeight.Bold)
                      Spacer(modifier = Modifier.height(16.dp))
                      Text("摄像头功能开发中", color = NeoChineseColors.RicePaper, fontSize = 14.sp)
                      Spacer(modifier = Modifier.height(8.dp))
                      Text("神念所至，万物皆现", color = NeoChineseColors.Gray, fontSize = 12.sp)
                  }
              }
          }
          VEOF
          sed -i 's/abiFilters += "arm64-v8a"/abiFilters += "x86_64"/g' app/build.gradle.kts

      - name: Build x86_64 APK
        run: gradle assembleDebug --no-build-cache -Dorg.gradle.jvmargs="-Xmx6g"
        env:
          GRADLE_OPTS: "-Xmx6g"

      - name: Cache ONNX model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/model
          key: deepseek-onnx-v4-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: deepseek-onnx-v4-

      - name: Create model directory
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: mkdir -p app/src/main/assets/model

      - name: Download model (ultra retry + mirrors)
        if: steps.cache-model.outputs.cache-hit != 'true'
        working-directory: app/src/main/assets/model
        timeout-minutes: 30
        run: |
          pip install -q huggingface_hub
          python3 << 'PYEOF'
          import os, sys, time, random
          from huggingface_hub import hf_hub_download
          mirrors = [
              "https://huggingface.co",
              "https://hf-mirror.com",
              "https://huggingface.co"
          ]
          repo_id = "onnx-community/DeepSeek-R1-Distill-Qwen-1.5B-ONNX"
          files = {
              "onnx/model_quantized.onnx": 800_000_000,
              "tokenizer.json": 1_000_000,
              "tokenizer_config.json": 100
          }
          def download_with_mirrors(filename, min_size, max_attempts=30):
              for mirror in mirrors:
                  os.environ["HF_ENDPOINT"] = mirror
                  for attempt in range(max_attempts):
                      try:
                          # 更大范围的随机延迟，避免触发速率限制
                          delay = random.uniform(10, 60) if attempt > 5 else random.uniform(5, 30)
                          time.sleep(delay)
                          print(f"Attempt {attempt+1} from {mirror} for {filename}")
                          path = hf_hub_download(
                              repo_id=repo_id,
                              filename=filename,
                              local_dir=".",
                              resume_download=True
                          )
                          size = os.path.getsize(path)
                          if size >= min_size:
                              print(f"Successfully downloaded {filename} ({size} bytes)")
                              return path
                          else:
                              print(f"Size mismatch: {size} < {min_size}")
                      except Exception as e:
                          print(f"Error: {e}")
                          if "429" in str(e):
                              # 遇到 429 等待更长时间
                              time.sleep(random.uniform(60, 180))
                          else:
                              time.sleep(15)
              return None

          for fname, min_size in files.items():
              result = download_with_mirrors(fname, min_size)
              if result is None:
                  print(f"FATAL: Could not download {fname}")
                  sys.exit(1)

          # 重命名模型文件
          if os.path.exists("onnx/model_quantized.onnx"):
              os.rename("onnx/model_quantized.onnx", "model.onnx")
              if os.path.isdir("onnx") and not os.listdir("onnx"):
                  os.rmdir("onnx")
          print("All model files ready")
          PYEOF

      - name: Setup emulator and run 10-turn test
        timeout-minutes: 30
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "emulator" "system-images;android-29;google_apis;x86_64" 2>&1 | tail -3
          export PATH="$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          export ANDROID_AVD_HOME="$HOME/.config/.android/avd"
          mkdir -p "$ANDROID_AVD_HOME"
          rm -rf "$ANDROID_AVD_HOME/test_avd.avd" "$ANDROID_AVD_HOME/test_avd.ini"
          echo "no" | avdmanager create avd -n test_avd -k "system-images;android-29;google_apis;x86_64" -d "pixel" -f 2>&1
          emulator -avd test_avd -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -netdelay none -netspeed full -no-snapshot -memory 1024 &
          EMULATOR_PID=$!

          for i in $(seq 1 60); do
            if ! kill -0 $EMULATOR_PID 2>/dev/null; then echo "Emulator died"; exit 1; fi
            if adb devices | grep -w "emulator-5554" | grep -q "device"; then break; fi
            sleep 5
          done
          for i in $(seq 1 30); do
            if [ "$(adb shell getprop sys.boot_completed 2>/dev/null)" = "1" ]; then break; fi
            sleep 5
          done
          sleep 5

          adb shell input keyevent 82
          adb shell wm dismiss-keyguard
          sleep 2
          adb install -g app/build/outputs/apk/debug/app-debug.apk
          adb shell pm grant com.eternal.ai android.permission.RECORD_AUDIO
          adb shell pm grant com.eternal.ai android.permission.CAMERA
          adb shell am start -n com.eternal.ai/.SplashActivity
          sleep 15

          # 文本输入函数（keyevent 逐字符）
          adb_text() {
            local str="$1"
            for ((i=0; i<${#str}; i++)); do
              char="${str:$i:1}"
              case "$char" in
                [a-z]) keycode=$(( 29 + $(printf '%d' "'$char") - 97 )) ;;
                [A-Z]) keycode=$(( 29 + $(printf '%d' "'$char") - 65 )) ;;
                [0-9]) keycode=$(( 7 + $(printf '%d' "'$char") - 48 )) ;;
                ' ') keycode=62 ;;
                '-') keycode=69 ;;
                '.') keycode=56 ;;
                '?') keycode=76 ;;
                '!') keycode=75 ;;
                *) keycode=0 ;;
              esac
              [ $keycode -ne 0 ] && adb shell input keyevent $keycode
            done
          }

          # 10 轮问题（英文）
          questions=("hello" "who are you" "1+1" "what is love" "how big is the universe" "meaning of life" "weather today" "write a poem" "recommend a book" "how to be happy")
          success=0
          for q in "${questions[@]}"; do
            echo "Sending: $q"
            adb shell input tap 200 1800
            sleep 0.5
            adb_text "$q"
            sleep 0.5
            adb shell input tap 900 1800
            sleep 18
            log=$(adb logcat -d | tail -100 | grep -i "永恒之神\|推理成功\|assistant" || true)
            if [ -n "$log" ]; then
              echo "Reply found for '$q'"
              success=$((success + 1))
            else
              echo "No reply for '$q'"
            fi
          done

          echo "Success count: $success/10"
          if [ $success -lt 10 ]; then
            echo "ERROR: Less than 10 replies"
            exit 1
          fi
          echo "All 10 replies verified!"
          kill $EMULATOR_PID || true

  build-arm64:
    needs: test-emulator
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'
      - name: Restore arm64 source
        run: |
          cat > app/src/main/java/com/eternal/ai/VideoScreen.kt << 'VEOF'
          package com.eternal.ai
          import androidx.compose.foundation.background
          import androidx.compose.foundation.layout.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp
          @Composable
          fun VideoScreen() {
              Box(modifier = Modifier.fillMaxSize().background(NeoChineseColors.InkBlack), contentAlignment = Alignment.Center) {
                  Column(horizontalAlignment = Alignment.CenterHorizontally) {
                      Text("📹 神域洞察", color = NeoChineseColors.SkyBlue, fontSize = 24.sp, fontWeight = FontWeight.Bold)
                      Spacer(modifier = Modifier.height(16.dp))
                      Text("摄像头功能开发中", color = NeoChineseColors.RicePaper, fontSize = 14.sp)
                      Spacer(modifier = Modifier.height(8.dp))
                      Text("神念所至，万物皆现", color = NeoChineseColors.Gray, fontSize = 12.sp)
                  }
              }
          }
          VEOF
          sed -i 's/abiFilters += "x86_64"/abiFilters += "arm64-v8a"/g' app/build.gradle.kts
      - name: Build arm64 APK
        run: gradle assembleDebug --no-build-cache -Dorg.gradle.jvmargs="-Xmx6g"
        env:
          GRADLE_OPTS: "-Xmx6g"
      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: 永恒之神-APK-arm64
          path: app/build/outputs/apk/debug/app-debug.apk
