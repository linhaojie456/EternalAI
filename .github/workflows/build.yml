name: Build Eternal APK
on: [push, workflow_dispatch]
env:
  ANDROID_HOME: /usr/local/lib/android/sdk
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin'}
      - uses: gradle/actions/setup-gradle@v3
        with: {gradle-version: '8.9'}
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - name: Create model directory
        run: mkdir -p app/src/main/assets/model
      - name: Download & Convert Qwen2.5-0.5B to ONNX
        working-directory: app/src/main/assets/model
        timeout-minutes: 20
        run: |
          pip install -q transformers optimum onnx onnxruntime
          python3 << 'PYEOF'
          from optimum.onnxruntime import ORTModelForCausalLM
          from transformers import AutoTokenizer
          import os, sys

          model_id = "Qwen/Qwen2.5-0.5B-Instruct"
          print(f"Downloading and exporting {model_id} to ONNX...")
          model = ORTModelForCausalLM.from_pretrained(model_id, export=True)
          tokenizer = AutoTokenizer.from_pretrained(model_id)

          model.save_pretrained(".")
          tokenizer.save_pretrained(".")

          for fname in ["model.onnx", "tokenizer.json", "tokenizer_config.json"]:
              if not os.path.exists(fname) or os.path.getsize(fname) < 1000:
                  print(f"ERROR: {fname} missing or too small")
                  sys.exit(1)
              print(f"✓ {fname}: {os.path.getsize(fname):,} bytes")
          print("ONNX export completed successfully.")
          PYEOF
      - name: Build debug APK
        run: gradle assembleDebug -Dorg.gradle.jvmargs="-Xmx6g"
        env: {GRADLE_OPTS: "-Xmx6g"}
      - name: Validate UI assets
        run: |
          ICON="app/src/main/res/drawable/ic_launcher_foreground.xml"
          grep -q "M54,20 L74,68 L34,68 Z" "$ICON" || exit 1
          grep -q "M54,88 L74,40 L34,40 Z" "$ICON" || exit 1
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with: {name: "永恒之神-APK", path: "app/build/outputs/apk/debug/app-debug.apk"}
