name: Build Eternal APK with DeepSeek Model
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download DeepSeek ONNX model
        run: |
          mkdir -p app/src/main/assets/model
          cd app/src/main/assets/model
          export HF_ENDPOINT=https://hf-mirror.com
          pip install -q huggingface_hub
          huggingface-cli download onnx-community/DeepSeek-R1-Distill-Qwen-1.5B-ONNX \
            --include "model_quantized.onnx" "tokenizer.json" "tokenizer_config.json" \
            --local-dir . --local-dir-use-symlinks False
          mv model_quantized.onnx model.onnx
        env:
          HF_ENDPOINT: https://hf-mirror.com

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 永恒-APK
          path: app/build/outputs/apk/debug/app-debug.apk
