name: Build Eternal APK
on: [push, workflow_dispatch]
env:
  ANDROID_HOME: /usr/local/lib/android/sdk
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin'}
      - uses: gradle/actions/setup-gradle@v3
        with: {gradle-version: '8.9'}
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - name: Create model directory
        run: mkdir -p app/src/main/assets/model
      - name: Download SmolLM2 ONNX model (Reliable)
        working-directory: app/src/main/assets/model
        run: |
          pip install -q huggingface_hub
          python3 << 'PYEOF'
          from huggingface_hub import snapshot_download
          import os, sys

          # 使用确认存在的 ONNX 模型仓库
          repo_id = "HuggingFaceTB/SmolLM2-0.2B-Instruct"

          print(f"Downloading model from {repo_id}...")
          # 只下载必要的 ONNX 和 Tokenizer 文件
          snapshot_download(
              repo_id=repo_id,
              local_dir=".",
              ignore_patterns=["*.safetensors", "*.bin", "*.msgpack", "*.h5"],
              resume_download=True,
          )

          # 验证关键文件
          required_files = ["model.onnx", "tokenizer.json", "tokenizer_config.json"]
          for fname in required_files:
              if not os.path.exists(fname):
                  print(f"Error: {fname} not found after download")
                  sys.exit(1)
              size = os.path.getsize(fname)
              if size < 1000:
                  print(f"Error: {fname} is too small ({size} bytes)")
                  sys.exit(1)
              print(f"✓ {fname}: {size:,} bytes")
          print("Model download and verification complete.")
          PYEOF
      - name: Inject onnxruntime native lib
        run: |
          wget -q https://repo1.maven.org/maven2/com/microsoft/onnxruntime/onnxruntime-android/1.21.1/onnxruntime-android-1.21.1.aar
          unzip -q onnxruntime-android-1.21.1.aar -d ort
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp ort/jni/arm64-v8a/libonnxruntime.so app/src/main/jniLibs/arm64-v8a/
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9
      - name: Write project files
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat > build.gradle.kts << 'INNER_EOF'
          plugins {
              id("com.android.application") version "8.5.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
              id("com.chaquo.python") version "15.0.1" apply false
          }
          INNER_EOF
      - name: Build debug APK
        run: ./gradlew assembleDebug -Dorg.gradle.jvmargs="-Xmx4g"
        env: {GRADLE_OPTS: "-Xmx4g"}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with: {name: "永恒-APK", path: "app/build/outputs/apk/debug/app-debug.apk"}
