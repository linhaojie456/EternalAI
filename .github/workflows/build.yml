name: Complete Test & Full Arm64 APK
on: [push, workflow_dispatch]
env:
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  test-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Download ONNX model
        run: |
          rm -rf model_files
          mkdir -p model_files
          pip install -q huggingface_hub
          python3 -c "
          import os, sys, time, random
          from huggingface_hub import hf_hub_download
          mirrors = ['https://huggingface.co', 'https://hf-mirror.com']
          repo_id = 'onnx-community/DeepSeek-R1-Distill-Qwen-1.5B-ONNX'
          files = {'onnx/model_quantized.onnx': 800000000, 'tokenizer.json': 1000000, 'tokenizer_config.json': 100}
          for fname, min_size in files.items():
              for mirror in mirrors:
                  os.environ['HF_ENDPOINT'] = mirror
                  for _ in range(20):
                      try:
                          time.sleep(random.uniform(10, 30))
                          path = hf_hub_download(repo_id, fname, local_dir='model_files')
                          if os.path.getsize(path) >= min_size:
                              break
                      except: pass
                  else: continue
                  break
              else: sys.exit(1)
          import shutil
          os.rename('model_files/onnx/model_quantized.onnx', 'model_files/model.onnx')
          shutil.rmtree('model_files/onnx')
          "

      - name: Prepare x86_64 build
        run: |
          sed -i 's/abiFilters += "arm64-v8a"/abiFilters += "x86_64"/g' app/build.gradle.kts

      - name: Build x86_64 APK
        run: gradle assembleDebug --no-build-cache -Dorg.gradle.jvmargs="-Xmx6g"
        env:
          GRADLE_OPTS: "-Xmx6g"

      - name: Emulator Test (push model + diagnostic)
        timeout-minutes: 30
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "emulator" "system-images;android-29;google_apis;x86_64" 2>&1 | tail -3
          export PATH="$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          export ANDROID_AVD_HOME="$HOME/.config/.android/avd"
          mkdir -p "$ANDROID_AVD_HOME"
          rm -rf "$ANDROID_AVD_HOME/test_avd.avd" "$ANDROID_AVD_HOME/test_avd.ini"
          echo "no" | avdmanager create avd -n test_avd -k "system-images;android-29;google_apis;x86_64" -d "pixel" -f 2>&1
          emulator -avd test_avd -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -netdelay none -netspeed full -no-snapshot -memory 1024 &
          EMULATOR_PID=$!

          for i in $(seq 1 60); do
            if ! kill -0 $EMULATOR_PID 2>/dev/null; then echo "Emulator died"; exit 1; fi
            if adb devices | grep -w "emulator-5554" | grep -q "device"; then break; fi
            sleep 5
          done
          for i in $(seq 1 30); do
            if [ "$(adb shell getprop sys.boot_completed 2>/dev/null)" = "1" ]; then break; fi
            sleep 5
          done
          sleep 5

          adb shell input keyevent 82
          adb shell wm dismiss-keyguard
          sleep 2
          adb install -g app/build/outputs/apk/debug/app-debug.apk
          adb shell pm grant com.eternal.ai android.permission.RECORD_AUDIO
          adb shell pm grant com.eternal.ai android.permission.CAMERA

          # Push model via run-as
          adb shell run-as com.eternal.ai mkdir -p files/model
          for f in model_files/*; do
            local_file=$(basename "$f")
            adb push "$f" "/data/local/tmp/$local_file"
            adb shell run-as com.eternal.ai cp "/data/local/tmp/$local_file" files/model/
            adb shell rm "/data/local/tmp/$local_file"
          done
          adb shell run-as com.eternal.ai ls -l files/model/

          # Restart app
          adb shell am force-stop com.eternal.ai
          sleep 2
          adb shell am start -n com.eternal.ai/.SplashActivity

          # Wait for engine activation via logcat
          echo "Waiting for engine..."
          for i in $(seq 1 30); do
            if adb logcat -d | grep -q "神格已激活"; then
              echo "Engine activated!"; break
            fi
            sleep 2
          done

          # Print logs
          echo "=== Eternal log ==="
          adb shell run-as com.eternal.ai cat files/eternal_log.txt 2>/dev/null || echo "No log"
          echo "=== Logcat InferenceEngine ==="
          adb logcat -d | grep -i "InferenceEngine\|CoreEngine" | tail -30

          # Try sending a message
          echo "Sending hello"
          adb shell input tap 200 1800
          sleep 0.5
          for code in 36 33 40 40 43; do adb shell input keyevent $code; done
          sleep 0.5
          adb shell input tap 900 1800
          sleep 20

          echo "=== Logcat after message ==="
          adb logcat -d | grep -i "永恒之神\|推理成功\|assistant\|InferenceEngine" | tail -20

          kill $EMULATOR_PID || true

  build-arm64:
    needs: test-emulator
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Download ONNX model for arm64
        run: |
          rm -rf app/src/main/assets/model
          mkdir -p app/src/main/assets/model
          pip install -q huggingface_hub
          python3 -c "
          import os, sys, time, random
          from huggingface_hub import hf_hub_download
          mirrors = ['https://huggingface.co', 'https://hf-mirror.com']
          repo_id = 'onnx-community/DeepSeek-R1-Distill-Qwen-1.5B-ONNX'
          files = {'onnx/model_quantized.onnx': 800000000, 'tokenizer.json': 1000000, 'tokenizer_config.json': 100}
          for fname, min_size in files.items():
              for mirror in mirrors:
                  os.environ['HF_ENDPOINT'] = mirror
                  for _ in range(20):
                      try:
                          time.sleep(random.uniform(10, 30))
                          path = hf_hub_download(repo_id, fname, local_dir='.')
                          if os.path.getsize(path) >= min_size:
                              break
                      except: pass
                  else: continue
                  break
              else: sys.exit(1)
          import shutil
          os.rename('onnx/model_quantized.onnx', 'model.onnx')
          shutil.rmtree('onnx', ignore_errors=True)
          "

      - name: Restore arm64 source
        run: |
          sed -i 's/abiFilters += "x86_64"/abiFilters += "arm64-v8a"/g' app/build.gradle.kts

      - name: Build arm64 APK
        run: gradle assembleDebug --no-build-cache -Dorg.gradle.jvmargs="-Xmx6g"
        env:
          GRADLE_OPTS: "-Xmx6g"

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: Eternal-AI-arm64
          path: app/build/outputs/apk/debug/app-debug.apk
