name: Final Build + Push Model + 10-Round Test
on: [push, workflow_dispatch]
env:
  ANDROID_HOME: /usr/local/lib/android/sdk
jobs:
  test-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Download ONNX model
        run: |
          rm -rf app/src/main/assets/model
          mkdir -p app/src/main/assets/model
          pip install -q huggingface_hub
          python3 << 'PYEOF'
          import os, sys, time, random
          from huggingface_hub import hf_hub_download
          mirrors = ["https://huggingface.co", "https://hf-mirror.com"]
          repo_id = "onnx-community/DeepSeek-R1-Distill-Qwen-1.5B-ONNX"
          files = {"onnx/model_quantized.onnx": 800_000_000, "tokenizer.json": 1_000_000, "tokenizer_config.json": 100}
          for fname, min_size in files.items():
              for mirror in mirrors:
                  os.environ["HF_ENDPOINT"] = mirror
                  for attempt in range(20):
                      try:
                          time.sleep(random.uniform(10, 30))
                          path = hf_hub_download(repo_id, fname, local_dir=".")
                          if os.path.getsize(path) >= min_size:
                              break
                      except:
                          pass
                  else:
                      continue
                  break
              else:
                  sys.exit(1)
          os.rename("onnx/model_quantized.onnx", "model.onnx")
          os.rmdir("onnx")
          PYEOF

      - name: Prepare x86_64 build
        run: |
          sed -i 's/abiFilters += "arm64-v8a"/abiFilters += "x86_64"/g' app/build.gradle.kts

      - name: Build x86_64 APK
        run: gradle assembleDebug --no-build-cache -Dorg.gradle.jvmargs="-Xmx6g"
        env:
          GRADLE_OPTS: "-Xmx6g"

      - name: Emulator Test (adb push model + 10 rounds)
        timeout-minutes: 30
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "emulator" "system-images;android-29;google_apis;x86_64" 2>&1 | tail -3
          export PATH="$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          export ANDROID_AVD_HOME="$HOME/.config/.android/avd"
          mkdir -p "$ANDROID_AVD_HOME"
          rm -rf "$ANDROID_AVD_HOME/test_avd.avd" "$ANDROID_AVD_HOME/test_avd.ini"
          echo "no" | avdmanager create avd -n test_avd -k "system-images;android-29;google_apis;x86_64" -d "pixel" -f 2>&1
          emulator -avd test_avd -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -netdelay none -netspeed full -no-snapshot -memory 1024 &
          EMULATOR_PID=$!

          for i in $(seq 1 60); do
            if ! kill -0 $EMULATOR_PID 2>/dev/null; then echo "Emulator died"; exit 1; fi
            if adb devices | grep -w "emulator-5554" | grep -q "device"; then break; fi
            sleep 5
          done
          for i in $(seq 1 30); do
            if [ "$(adb shell getprop sys.boot_completed 2>/dev/null)" = "1" ]; then break; fi
            sleep 5
          done
          sleep 5

          adb shell input keyevent 82
          adb shell wm dismiss-keyguard
          sleep 2
          adb install -g app/build/outputs/apk/debug/app-debug.apk
          adb shell pm grant com.eternal.ai android.permission.RECORD_AUDIO
          adb shell pm grant com.eternal.ai android.permission.CAMERA

          # 关键修复：通过 adb push 把模型文件直接推送到应用的私有目录
          echo "Pushing model files to device..."
          adb root || echo "Root failed, trying run-as..."
          MODEL_DIR="/data/data/com.eternal.ai/files/model"
          adb shell "mkdir -p $MODEL_DIR"
          for f in app/src/main/assets/model/*; do
            adb push "$f" "$MODEL_DIR/"
          done
          adb shell "chmod -R 755 $MODEL_DIR"
          adb shell "ls -l $MODEL_DIR"

          adb shell am start -n com.eternal.ai/.SplashActivity

          # 等待引擎重新初始化（模型文件已存在）
          echo "Waiting for engine (with model)..."
          sleep 20

          # 检查引擎日志
          echo "Engine log:"
          adb shell run-as com.eternal.ai cat files/eternal_log.txt 2>/dev/null

          # 10 轮英文测试
          questions=("hello" "who are you" "1+1" "what is love" "how big is the universe" "meaning of life" "weather today" "write a poem" "recommend a book" "how to be happy")
          success=0
          for q in "${questions[@]}"; do
            echo "Sending: $q"
            adb shell input tap 200 1800
            sleep 0.5
            for ((i=0; i<${#q}; i++)); do
              char="${q:$i:1}"
              case "$char" in
                [a-z]) keycode=$(( 29 + $(printf '%d' "'$char") - 97 )) ;;
                [A-Z]) keycode=$(( 29 + $(printf '%d' "'$char") - 65 )) ;;
                [0-9]) keycode=$(( 7 + $(printf '%d' "'$char") - 48 )) ;;
                ' ') keycode=62 ;;
                '-') keycode=69 ;;
                '?') keycode=76 ;;
                *) keycode=0 ;;
              esac
              [ $keycode -ne 0 ] && adb shell input keyevent $keycode
            done
            sleep 0.5
            adb shell input tap 900 1800
            sleep 18
            log=$(adb logcat -d | tail -50 | grep -i "永恒之神\|推理成功\|assistant" || true)
            if [ -n "$log" ]; then
              echo "Reply found for '$q'"
              success=$((success + 1))
            else
              echo "No reply for '$q'"
            fi
          done

          echo "Success count: $success/10"
          if [ $success -lt 10 ]; then
            echo "=== Debug: log file ==="
            adb shell run-as com.eternal.ai cat files/eternal_log.txt 2>/dev/null
            echo "=== Debug: model files ==="
            adb shell run-as com.eternal.ai ls -l files/model/ 2>/dev/null
            exit 1
          fi
          kill $EMULATOR_PID || true

  build-arm64:
    needs: test-emulator
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Download ONNX model for arm64
        run: |
          rm -rf app/src/main/assets/model
          mkdir -p app/src/main/assets/model
          pip install -q huggingface_hub
          python3 << 'PYEOF'
          import os, sys, time, random
          from huggingface_hub import hf_hub_download
          mirrors = ["https://huggingface.co", "https://hf-mirror.com"]
          repo_id = "onnx-community/DeepSeek-R1-Distill-Qwen-1.5B-ONNX"
          files = {"onnx/model_quantized.onnx": 800_000_000, "tokenizer.json": 1_000_000, "tokenizer_config.json": 100}
          for fname, min_size in files.items():
              for mirror in mirrors:
                  os.environ["HF_ENDPOINT"] = mirror
                  for attempt in range(20):
                      try:
                          time.sleep(random.uniform(10, 30))
                          path = hf_hub_download(repo_id, fname, local_dir=".")
                          if os.path.getsize(path) >= min_size:
                              break
                      except:
                          pass
                  else:
                      continue
                  break
              else:
                  sys.exit(1)
          os.rename("onnx/model_quantized.onnx", "model.onnx")
          os.rmdir("onnx")
          PYEOF

      - name: Restore arm64 source
        run: |
          sed -i 's/abiFilters += "x86_64"/abiFilters += "arm64-v8a"/g' app/build.gradle.kts

      - name: Build arm64 APK
        run: gradle assembleDebug --no-build-cache -Dorg.gradle.jvmargs="-Xmx6g"
        env:
          GRADLE_OPTS: "-Xmx6g"

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: 永恒之神-APK-arm64
          path: app/build/outputs/apk/debug/app-debug.apk
