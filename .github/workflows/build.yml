name: Final Test (4096MB RAM)
on: [push, workflow_dispatch]
env:
  ANDROID_HOME: /usr/local/lib/android/sdk
jobs:
  test-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Run CI Test Script
        run: bash ci_test.sh

  build-arm64:
    needs: test-emulator
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build ARM64 APK (with model in assets)
        run: |
          rm -rf app/src/main/assets/model
          mkdir -p app/src/main/assets/model
          pip install -q huggingface_hub
          python3 -c "
          import os, sys, time, random
          from huggingface_hub import hf_hub_download
          mirrors = ['https://huggingface.co', 'https://hf-mirror.com']
          repo_id = 'onnx-community/DeepSeek-R1-Distill-Qwen-1.5B-ONNX'
          files = {'onnx/model_quantized.onnx': 800000000, 'tokenizer.json': 1000000, 'tokenizer_config.json': 100}
          for fname, min_size in files.items():
              for mirror in mirrors:
                  os.environ['HF_ENDPOINT'] = mirror
                  for _ in range(20):
                      try:
                          time.sleep(random.uniform(10, 30))
                          path = hf_hub_download(repo_id, fname, local_dir='app/src/main/assets/model')
                          if os.path.getsize(path) >= min_size:
                              break
                      except: pass
                  else: continue
                  break
              else: sys.exit(1)
          import shutil
          os.rename('app/src/main/assets/model/onnx/model_quantized.onnx', 'app/src/main/assets/model/model.onnx')
          shutil.rmtree('app/src/main/assets/model/onnx')
          "
          sed -i 's/abiFilters += "x86_64"/abiFilters += "arm64-v8a"/g' app/build.gradle.kts
          gradle assembleDebug --no-build-cache -Dorg.gradle.jvmargs="-Xmx6g"
        env:
          GRADLE_OPTS: "-Xmx6g"
      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: Eternal-AI-arm64
          path: app/build/outputs/apk/debug/app-debug.apk
