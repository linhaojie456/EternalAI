name: Build Eternal APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.9

      - name: Create model directory
        run: mkdir -p app/src/main/assets/model

      - name: Download DeepSeek ONNX model
        working-directory: app/src/main/assets/model
        run: |
          pip install -q huggingface_hub
          hf download onnx-community/DeepSeek-R1-Distill-Qwen-1.5B-ONNX \
            onnx/model_quantized.onnx tokenizer.json tokenizer_config.json \
            --local-dir .
          mv onnx/model_quantized.onnx model.onnx
          rm -rf onnx

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Fix AGP version compatibility
        run: |
          sed -i 's/id("com.android.application") version "8.2.0"/id("com.android.application") version "8.7.3"/' build.gradle.kts
          sed -i 's/id("org.jetbrains.kotlin.android") version "1.9.20"/id("org.jetbrains.kotlin.android") version "1.9.22"/' build.gradle.kts
          sed -i 's/compileSdk = 33/compileSdk = 34/' app/build.gradle.kts

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 永恒-APK
          path: app/build/outputs/apk/debug/app-debug.apk
