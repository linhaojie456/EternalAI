name: Build Eternal APK
on: [push, workflow_dispatch]
env:
  ANDROID_HOME: /usr/local/lib/android/sdk
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin'}
      - uses: gradle/actions/setup-gradle@v3
        with: {gradle-version: '8.9'}
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - name: Create model directory
        run: mkdir -p app/src/main/assets/model
      - name: Download and convert Qwen2.5-0.5B to ONNX
        working-directory: app/src/main/assets/model
        run: |
          pip install huggingface_hub optimum onnx onnxruntime
          python3 << 'PYEOF'
          from optimum.onnxruntime import ORTModelForCausalLM
          from transformers import AutoTokenizer
          import shutil, os

          model_id = "Qwen/Qwen2.5-0.5B-Instruct"
          print(f"Downloading {model_id} and exporting to ONNX...")
          # 导出 ONNX 模型，quantization 可选，这里使用默认 float32
          model = ORTModelForCausalLM.from_pretrained(model_id, export=True)
          tokenizer = AutoTokenizer.from_pretrained(model_id)

          # 保存到当前目录
          model.save_pretrained(".")
          tokenizer.save_pretrained(".")

          # 确认文件存在且大小 > 0
          for fname in ["model.onnx", "tokenizer.json"]:
              size = os.path.getsize(fname)
              print(f"{fname}: {size:,} bytes")
              if size < 10000:
                  raise Exception(f"{fname} is too small, something went wrong")
          print("ONNX model exported successfully.")
          PYEOF
      - name: Inject onnxruntime native lib
        run: |
          wget -q https://repo1.maven.org/maven2/com/microsoft/onnxruntime/onnxruntime-android/1.21.1/onnxruntime-android-1.21.1.aar
          unzip -q onnxruntime-android-1.21.1.aar -d ort
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp ort/jni/arm64-v8a/libonnxruntime.so app/src/main/jniLibs/arm64-v8a/
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9
      - name: Write project files
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat > build.gradle.kts << 'INNER_EOF'
          plugins {
              id("com.android.application") version "8.5.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
              id("com.chaquo.python") version "15.0.1" apply false
          }
          INNER_EOF
      - name: Build debug APK
        run: ./gradlew assembleDebug -Dorg.gradle.jvmargs="-Xmx4g"
        env: {GRADLE_OPTS: "-Xmx4g"}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with: {name: "永恒-APK", path: "app/build/outputs/apk/debug/app-debug.apk"}
