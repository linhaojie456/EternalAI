name: Final Optimized Build (Stable Emulator)
on: [push, workflow_dispatch]
env:
  ANDROID_HOME: /usr/local/lib/android/sdk
jobs:
  test-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Prepare x86_64 build
        run: |
          cat > app/src/main/java/com/eternal/ai/VideoScreen.kt << 'VEOF'
          package com.eternal.ai
          import androidx.compose.foundation.background
          import androidx.compose.foundation.layout.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp
          @Composable
          fun VideoScreen() {
              Box(modifier = Modifier.fillMaxSize().background(NeoChineseColors.InkBlack), contentAlignment = Alignment.Center) {
                  Column(horizontalAlignment = Alignment.CenterHorizontally) {
                      Text("📹 神域洞察", color = NeoChineseColors.SkyBlue, fontSize = 24.sp, fontWeight = FontWeight.Bold)
                      Spacer(modifier = Modifier.height(16.dp))
                      Text("摄像头功能开发中", color = NeoChineseColors.RicePaper, fontSize = 14.sp)
                      Spacer(modifier = Modifier.height(8.dp))
                      Text("神念所至，万物皆现", color = NeoChineseColors.Gray, fontSize = 12.sp)
                  }
              }
          }
          VEOF
          sed -i 's/abiFilters += "arm64-v8a"/abiFilters += "x86_64"/g' app/build.gradle.kts
      - name: Build x86_64 APK
        run: gradle assembleDebug --no-build-cache -Dorg.gradle.jvmargs="-Xmx6g"
        env:
          GRADLE_OPTS: "-Xmx6g"
      - name: Cache ONNX model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/model
          key: deepseek-onnx-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: deepseek-onnx-
      - name: Download model
        if: steps.cache-model.outputs.cache-hit != 'true'
        working-directory: app/src/main/assets/model
        timeout-minutes: 20
        run: |
          pip install -q huggingface_hub
          python3 << 'PYEOF'
          import os, sys, time, random
          from huggingface_hub import hf_hub_download
          mirrors = ["https://huggingface.co", "https://hf-mirror.com"]
          repo_id = "onnx-community/DeepSeek-R1-Distill-Qwen-1.5B-ONNX"
          files = {"onnx/model_quantized.onnx": 800_000_000, "tokenizer.json": 1_000_000, "tokenizer_config.json": 100}
          for fname, min_size in files.items():
              for mirror in mirrors:
                  os.environ["HF_ENDPOINT"] = mirror
                  for _ in range(10):
                      try:
                          time.sleep(random.uniform(5, 15))
                          path = hf_hub_download(repo_id, fname, local_dir=".")
                          if os.path.getsize(path) >= min_size:
                              break
                      except:
                          pass
                  else:
                      continue
                  break
              else:
                  sys.exit(1)
          if os.path.exists("onnx/model_quantized.onnx"):
              os.rename("onnx/model_quantized.onnx", "model.onnx")
              os.rmdir("onnx")
          PYEOF
      - name: x86_64 Emulator Test (Stable)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          ram-size: 2048M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -netdelay none -netspeed full -no-snapshot-save -no-snapshot-load
          disable-animations: true
          force-avd-creation: false
          script: |
            echo "Waiting for device to be ready..."
            # 增加重试机制，确保 adb 连接稳定
            for i in $(seq 1 20); do
              adb devices | grep "emulator-5554" | grep "device" && break
              echo "Waiting for emulator... ($i)"
              sleep 5
            done
            # 彻底重启 adb 服务，避免离线
            adb kill-server
            adb start-server
            adb wait-for-device
            sleep 10

            # 尝试解锁屏幕并唤醒
            adb shell input keyevent 82
            adb shell wm dismiss-keyguard
            sleep 3

            # 卸载旧版本
            adb uninstall com.eternal.ai || true
            echo "Installing APK..."
            # 使用 -g 授予所有运行时权限
            adb install -g app/build/outputs/apk/debug/app-debug.apk
            # 额外授予危险权限
            adb shell pm grant com.eternal.ai android.permission.RECORD_AUDIO
            adb shell pm grant com.eternal.ai android.permission.CAMERA
            adb shell pm grant com.eternal.ai android.permission.WRITE_EXTERNAL_STORAGE
            adb shell pm grant com.eternal.ai android.permission.READ_EXTERNAL_STORAGE

            # 启动应用
            echo "Starting app..."
            adb shell am start -n com.eternal.ai/.SplashActivity
            sleep 12

            # 模拟用户交互
            echo "Simulating user interaction..."
            adb shell input tap 200 1800
            sleep 1
            adb shell input text "你好"
            sleep 1
            adb shell input tap 900 1800
            sleep 25

            # 检查推理日志
            echo "Checking logs..."
            log=$(adb logcat -d | grep -i "永恒之神\|推理成功\|assistant" || true)
            if [ -z "$log" ]; then
              echo "ERROR: No inference reply detected"
              exit 1
            fi
            echo "Inference verified! Sample log:"
            echo "$log"
  build-arm64:
    needs: test-emulator
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'
      - name: Restore arm64 source
        run: |
          cat > app/src/main/java/com/eternal/ai/VideoScreen.kt << 'VEOF'
          package com.eternal.ai
          import androidx.compose.foundation.background
          import androidx.compose.foundation.layout.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.compose.ui.unit.sp
          @Composable
          fun VideoScreen() {
              Box(modifier = Modifier.fillMaxSize().background(NeoChineseColors.InkBlack), contentAlignment = Alignment.Center) {
                  Column(horizontalAlignment = Alignment.CenterHorizontally) {
                      Text("📹 神域洞察", color = NeoChineseColors.SkyBlue, fontSize = 24.sp, fontWeight = FontWeight.Bold)
                      Spacer(modifier = Modifier.height(16.dp))
                      Text("摄像头功能开发中", color = NeoChineseColors.RicePaper, fontSize = 14.sp)
                      Spacer(modifier = Modifier.height(8.dp))
                      Text("神念所至，万物皆现", color = NeoChineseColors.Gray, fontSize = 12.sp)
                  }
              }
          }
          VEOF
          sed -i 's/abiFilters += "x86_64"/abiFilters += "arm64-v8a"/g' app/build.gradle.kts
      - name: Build arm64 APK
        run: gradle assembleDebug --no-build-cache -Dorg.gradle.jvmargs="-Xmx6g"
        env:
          GRADLE_OPTS: "-Xmx6g"
      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: 永恒之神-APK-arm64
          path: app/build/outputs/apk/debug/app-debug.apk
