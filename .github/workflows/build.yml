name: Build Eternal APK
on: [push, workflow_dispatch]

env:
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.9

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create model directory
        run: mkdir -p app/src/main/assets/model

      - name: Download DeepSeek ONNX model
        working-directory: app/src/main/assets/model
        run: |
          pip install -q huggingface_hub
          hf download onnx-community/DeepSeek-R1-Distill-Qwen-1.5B-ONNX \
            onnx/model_quantized.onnx tokenizer.json tokenizer_config.json \
            --local-dir .
          mv onnx/model_quantized.onnx model.onnx
          rm -rf onnx

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Write correct build files
        run: |
          cat > build.gradle.kts << 'INNER_EOF'
          plugins {
              id("com.android.application") version "8.5.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
              id("com.chaquo.python") version "15.0.1" apply false
              id("org.jetbrains.kotlin.kapt") version "1.9.22" apply false
          }
          INNER_EOF

          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build debug APK (4GB heap)
        run: ./gradlew assembleDebug -Dorg.gradle.jvmargs="-Xmx4g"
        env:
          GRADLE_OPTS: "-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 永恒-APK
          path: app/build/outputs/apk/debug/app-debug.apk
