name: Build Eternal APK (Final)
on: [push, workflow_dispatch]

env:
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        api-level: [26]
        arch: [arm64-v8a]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin'}
      - uses: gradle/actions/setup-gradle@v3
        with: {gradle-version: '8.9'}
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}

      # 模型缓存
      - name: Cache ONNX model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/model
          key: deepseek-onnx-final-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: deepseek-onnx-final-

      - name: Create model directory
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: mkdir -p app/src/main/assets/model

      - name: Download DeepSeek ONNX model (super retry)
        if: steps.cache-model.outputs.cache-hit != 'true'
        working-directory: app/src/main/assets/model
        timeout-minutes: 30
        run: |
          pip install -q huggingface_hub
          python3 << 'PYEOF'
          import os, sys, time, random
          from huggingface_hub import hf_hub_download

          token = os.environ.get("HF_TOKEN", None)
          mirrors = [
              "https://huggingface.co",
              "https://hf-mirror.com",
              "https://huggingface.co"
          ]

          repo_id = "onnx-community/DeepSeek-R1-Distill-Qwen-1.5B-ONNX"
          files = {
              "onnx/model_quantized.onnx": 800_000_000,
              "tokenizer.json": 1_000_000,
              "tokenizer_config.json": 100
          }

          def download_file(filename, min_size, max_retries=15):
              for mirror in mirrors:
                  os.environ["HF_ENDPOINT"] = mirror
                  for attempt in range(max_retries):
                      try:
                          jitter = random.uniform(5, 30)
                          time.sleep(jitter)
                          path = hf_hub_download(
                              repo_id, filename,
                              local_dir=".",
                              token=token,
                              resume_download=True
                          )
                          size = os.path.getsize(path)
                          if size >= min_size:
                              print(f"✅ Downloaded {filename} from {mirror} ({size} bytes)")
                              return path
                          else:
                              print(f"Size mismatch {filename}: {size} < {min_size}, retry...")
                      except Exception as e:
                          print(f"❌ Mirror {mirror} fail: {e}")
                          if "429" in str(e):
                              time.sleep(random.uniform(60, 120))
                          else:
                              time.sleep(15 * (attempt + 1))
              return None

          for fname, min_size in files.items():
              result = download_file(fname, min_size)
              if result is None:
                  print(f"FATAL: Failed to download {fname}")
                  sys.exit(1)

          if os.path.exists("onnx/model_quantized.onnx"):
              os.rename("onnx/model_quantized.onnx", "model.onnx")
              if os.path.isdir("onnx") and not os.listdir("onnx"):
                  os.rmdir("onnx")
          else:
              print("model_quantized.onnx not found")
              sys.exit(1)

          print("✅ All model files ready")
          PYEOF

      - name: Build debug APK
        run: gradle assembleDebug -Dorg.gradle.jvmargs="-Xmx6g"
        env: {GRADLE_OPTS: "-Xmx6g"}

      - name: Install validation dependencies
        run: pip install onnxruntime tokenizers

      - name: Validate UI assets
        run: |
          ICON="app/src/main/res/drawable/ic_launcher_foreground.xml"
          grep -q "M54,20 L74,68 L34,68 Z" "$ICON" || exit 1
          grep -q "M54,88 L74,40 L34,40 Z" "$ICON" || exit 1

      - name: Validate model with dialogues (at least 3)
        working-directory: app/src/main/assets/model
        timeout-minutes: 30
        run: |
          python3 << 'PYEOF'
          import onnxruntime as ort
          from tokenizers import Tokenizer
          import numpy as np, json, os, sys, time

          session = ort.InferenceSession("model.onnx", providers=['CPUExecutionProvider'])
          tokenizer = Tokenizer.from_file("tokenizer.json")
          output_names = [o.name for o in session.get_outputs()]
          logits_name = next((n for n in output_names if "logits" in n.lower()), output_names[0])
          logits_index = output_names.index(logits_name)
          eos_token_id = json.load(open("tokenizer_config.json")).get("eos_token_id", 151643)
          attention_mask_shape = None
          for inp in session.get_inputs():
              if inp.name == "attention_mask": attention_mask_shape = inp.shape
          past_info = {}
          for inp in session.get_inputs():
              if inp.name.startswith("past_key_values."): past_info[inp.name] = (inp.shape[1], inp.shape[3])

          def create_attention_mask(seq_len):
              shape = list(attention_mask_shape) if attention_mask_shape else [1, seq_len]
              for i in range(len(shape)):
                  if not isinstance(shape[i], int) or shape[i] <= 0: shape[i] = seq_len
              if len(shape) > 0: shape[0] = 1
              return np.ones(shape, dtype=np.int64)

          def gen(prompt):
              formatted = f"<|im_start|>system\n汝是永恒之神。<|im_end|>\n<|im_start|>user\n{prompt}<|im_end|>\n<|im_start|>assistant\n"
              enc = tokenizer.encode(formatted)
              all_ids = enc.ids
              input_ids = np.array(all_ids, dtype=np.int64).reshape(1, -1)
              seq_len = input_ids.shape[1]
              attention_mask = create_attention_mask(seq_len)
              position_ids = np.arange(seq_len, dtype=np.int64).reshape(1, -1)
              past = {}
              for i in range(28):
                  key_name = f"past_key_values.{i}.key"
                  heads = past_info.get(key_name, (2,))[0]; head_dim = past_info.get(key_name, (0, 128))[1]
                  past[key_name] = np.zeros((1, heads, 0, head_dim), dtype=np.float32)
                  past[f"past_key_values.{i}.value"] = np.zeros((1, heads, 0, head_dim), dtype=np.float32)
              generated = []
              for _ in range(150):
                  ort_inputs = {"input_ids": input_ids, "attention_mask": attention_mask, "position_ids": position_ids, **past}
                  outputs = session.run(output_names, ort_inputs)
                  logits = outputs[logits_index][0]; next_token = int(np.argmax(logits[-1, :]))
                  if generated and next_token == eos_token_id: break
                  generated.append(next_token)
                  input_ids = np.array([[next_token]], dtype=np.int64)
                  attention_mask = create_attention_mask(1)
                  position_ids = np.array([[seq_len + len(generated) - 1]], dtype=np.int64)
                  new_past = {}
                  for i, name in enumerate(output_names):
                      if name.startswith("present."):
                          tensor = outputs[i]; parts = name.removeprefix("present.").split(".")
                          if len(parts) >= 2:
                              layer_idx = int(parts[0])
                              if name.endswith(".key"): new_past[f"past_key_values.{layer_idx}.key"] = tensor
                              elif name.endswith(".value"): new_past[f"past_key_values.{layer_idx}.value"] = tensor
                  if new_past: past = new_past
              if not generated: return None
              decoded = tokenizer.decode(np.array(all_ids + generated, dtype=np.int64).reshape(1, -1).flatten().tolist())
              idx = decoded.rfind("<|im_start|>assistant\n")
              return decoded[idx+len("<|im_start|>assistant\n"):].strip() if idx>=0 else decoded

          prompts = ["你好", "你是谁？", "1+1=？", "什么是爱？", "宇宙有多大？", "生命的意义", "今天天气", "写一首诗", "推荐一本书", "如何幸福"]
          success = 0
          for p in prompts:
              for attempt in range(3):
                  reply = gen(p)
                  if reply and len(reply.strip()) >= 2:
                      success += 1; print(f"✓ [{p}] -> {reply[:60]}"); break
                  time.sleep(1)
              if success >= 3: break

          if success < 3:
              print(f"❌ 仅 {success}/10 条对话通过验证，构建中止"); sys.exit(1)
          print(f"✅ 离线推理验证通过: {success} 条对话")
          PYEOF

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with: {name: "永恒之神-APK", path: "app/build/outputs/apk/debug/app-debug.apk"}
